# ======================
# FIREBASE BACKEND CONFIG
# ======================

spring.application.name=FoundBuddyBackend

# Render gibt PORT vor
server.port=${PORT:8080}
server.address=0.0.0.0

logging.level.root=INFO
logging.level.com.google.firebase=INFO

# H2/JPA deaktiviert (ok)
spring.h2.console.enabled=false
spring.datasource.url=
spring.jpa.hibernate.ddl-auto=none

# ======================
# EMAIL CONFIGURATION
# ======================
# KEINE Secrets im Code! Alles ueber Render Env Vars setzen.
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Timeouts, damit Requests nicht ewig haengen
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.base-url=${APP_BASE_URL:http://localhost:8080}

brevo.api-key=${BREVO_API_KEY:}
brevo.sender.email=${BREVO_SENDER_EMAIL:}
brevo.sender.name=${BREVO_SENDER_NAME:FoundBuddy}


# ======================
# AI SERVICES
# ======================
ai.clip.url=${CLIP_URL:http://localhost:8001}
ai.translate.url=${TRANSLATE_URL:http://localhost:5000/translate}

# ======================
# UPLOADS (Firebase Storage)
# ======================
# Bucket ueber Render Env Var setzen: FIREBASE_STORAGE_BUCKET="<project-id>.appspot.com"
firebase.storage.bucket=${FIREBASE_STORAGE_BUCKET:}

# Multipart Upload Limits
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

