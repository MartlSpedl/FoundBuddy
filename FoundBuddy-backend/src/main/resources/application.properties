# Spring Boot application configuration for the FoundBuddy backend.

# Use an embedded file‑based H2 database under the 'data' directory.  The
# `DB_CLOSE_ON_EXIT=FALSE` flag keeps the database open across JVM shutdowns
# when running the application repeatedly.  `AUTO_SERVER=TRUE` allows the
# database to be accessed from multiple processes (useful for debugging
# with external tools).
spring.datasource.url=jdbc:h2:file:./data/foundbuddydb;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Let Spring Data create and update database schema automatically.
spring.jpa.hibernate.ddl-auto=update

# Show SQL statements in the console for easier debugging.  Comment out
# in production.
spring.jpa.show-sql=true

# Enable H2 console at /h2-console for debugging the database state.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console