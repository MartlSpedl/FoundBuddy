services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: foundbuddy
      POSTGRES_USER: foundbuddy
      POSTGRES_PASSWORD: foundbuddy
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
  adminer:
    image: adminer:4
    ports:
      - "8081:8080"
volumes:
  dbdata:
