name: Deploy Backend to HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - 'FoundBuddy-backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Upload backend to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 - <<'EOF'
import os
from huggingface_hub import HfApi

token = os.environ["HF_TOKEN"]
api = HfApi()

print("Uploading FoundBuddy-backend to HuggingFace Space...")

api.upload_folder(
    folder_path="FoundBuddy-backend",
    repo_id="MartlSpedl/foundbuddy-backend",
    repo_type="space",
    token=token,
    ignore_patterns=[
        "bin/**",
        "build/**",
        "uploads/**",
        "*.class",
        "*.jar",
        "src/main/resources/firebase-key.json",
        ".idea/**",
        ".gradle/**",
    ],
    commit_message=f"Auto-deploy from GitHub commit ${{ github.sha }}"
)

print("Upload complete!")
EOF
