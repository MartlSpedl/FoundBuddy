name: Deploy Backend to HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - 'FoundBuddy-backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e

          git config --global user.email "ci@foundbuddy"
          git config --global user.name "FoundBuddy CI"

          # Store HF credentials so git can authenticate
          git config --global credential.helper store
          echo "https://MartlSpedl:${HF_TOKEN}@huggingface.co" > ~/.git-credentials

          # Clone the HF Space (public clone, push uses credentials above)
          git clone https://huggingface.co/spaces/MartlSpedl/foundbuddy-backend /tmp/hf-space

          # Write correct HF Space README (never overwritten by rsync)
          cat > /tmp/hf-space/README.md << 'HFREADME'
---
title: FoundBuddy Backend
emoji: 🐾
colorFrom: blue
colorTo: green
sdk: docker
app_port: 7860
pinned: false
---

# FoundBuddy Backend

Spring Boot REST API for the FoundBuddy Android app.
HFREADME

          # Sync backend files (excluding build artifacts, secrets and README)
          rsync -av --delete \
            --exclude='.git' \
            --exclude='bin/' \
            --exclude='build/' \
            --exclude='uploads/' \
            --exclude='README.md' \
            --exclude='src/main/resources/firebase-key.json' \
            FoundBuddy-backend/ /tmp/hf-space/

          # Commit and force-push (GitHub is always the source of truth)
          cd /tmp/hf-space
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to deploy"
            exit 0
          fi
          git commit -m "Auto-deploy from GitHub commit ${{ github.sha }}"
          git push --force https://MartlSpedl:${HF_TOKEN}@huggingface.co/spaces/MartlSpedl/foundbuddy-backend main
