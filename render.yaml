services:
  # 1) CLIP Service (öffentlich, kostenlos)
  - type: web
    name: foundbuddy-clip
    env: docker
    rootDir: clip-service
    plan: free
    autoDeploy: true

  # 2) Backend Service
  - type: web
    name: foundbuddy-backend
    env: docker
    rootDir: FoundBuddy-backend
    plan: free
    autoDeploy: true
    envVars:
      - key: CLIP_HOST
        fromService:
          name: foundbuddy-clip
          type: web
          property: host

