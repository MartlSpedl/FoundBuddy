services:
  # 1) CLIP service (öffentlich, kostenlos)
  - type: web
    name: foundbuddy-clip
    env: docker
    rootDir: clip-service
    plan: free
    autoDeploy: true

  # 2) Backend
  - type: web
    name: foundbuddy-backend
    env: docker
    rootDir: FoundBuddy-backend
    plan: free
    autoDeploy: true
    envVars:
      - key: CLIP_URL
        fromService:
          name: foundbuddy-clip
          type: web
          property: url

