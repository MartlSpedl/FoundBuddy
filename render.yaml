services:
  # 1) CLIP Service auf Railway (extern)
  # - wird auf Railway deployed, nicht hier

  # 2) Backend Service
  - type: web
    name: foundbuddy-backend
    env: docker
    rootDir: FoundBuddy-backend
    plan: free
    autoDeploy: true
    envVars:
      - key: CLIP_URL
        value: https://foundbuddy-clip-production.up.railway.app

