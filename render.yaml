services:
  # 1) CLIP Service auf Hugging Face (extern)
  # - wird auf Hugging Face Spaces deployed

  # 2) Backend Service
  - type: web
    name: foundbuddy-backend
    env: docker
    rootDir: FoundBuddy-backend
    plan: free
    autoDeploy: true
    envVars:
      - key: CLIP_URL
        value: https://martlspedl-foundbuddy-clip.hf.space
      - key: FIREBASE_PROJECT_ID
        value: foundbuddy
      - key: FIREBASE_STORAGE_BUCKET
        value: foundbuddy.firebasestorage.app
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false # Im Render Dashboard als separate Variable setzen

